name: Release

# Push a semver tag (e.g. `v0.1.0`) to trigger a full multi-platform release:
# builds the app on macOS (arm64 + x64), Windows (x64), and Linux (x64), then
# creates a draft GitHub Release and attaches every installer artifact.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# You can also fire it manually from the Actions tab.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Required so tauri-action can create/update the release.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS (Intel)
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Windows (x64)
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - name: Linux (x64)
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm deps
        run: npm ci

      # Uses the official Tauri action: it runs `tauri build`, collects every
      # bundle artifact for the platform (dmg + app on macOS; msi + nsis on
      # Windows; deb + AppImage on Linux), and uploads them to a draft
      # GitHub Release keyed off the pushed tag.
      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing (macOS): set these secrets in the repo to
          # produce a notarized DMG. Leaving them unset builds unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Optional Tauri updater signing key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LabVAR ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            - **macOS (Apple Silicon):** `LabVAR_*_aarch64.dmg`
            - **macOS (Intel):** `LabVAR_*_x64.dmg`
            - **Windows 10/11:** `LabVAR_*_x64-setup.exe` or `LabVAR_*_x64_en-US.msi`
            - **Linux:** `labvar_*_amd64.deb` or `labvar_*_amd64.AppImage`

            See the [README](https://github.com/${{ github.repository }}#first-run) for the first-run walkthrough.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
